<head>
  <meta charset="utf-8" />

  <title>mazoPegatas</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* =========================================================
       PALETTE — Shepard Fairey cream/red/black
       + Haring neon accents
       + Basquiat raw energy
       ========================================================= */
    :root {
      --cream: #F5E6C8;
      --red: #E3342F;
      --black: #0A0A0A;
      --dark: #1A1A1A;
      --neon-pink: #FF3CAC;
      --neon-yellow: #FDFC47;
      --neon-green: #00F260;
      --blue-basquiat: #3B82F6;
      --crown-gold: #FFD700;
      --muted: #B8A88A;
      --card-bg: rgba(245,230,200,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Space Mono', monospace;
      background: var(--black);
      color: var(--cream);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* =========================================================
       PROPAGANDA BORDER — Fairey-style geometric frame
       ========================================================= */
    .propaganda-border {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      border: 4px solid var(--red);
      box-shadow:
        inset 0 0 0 2px var(--black),
        inset 0 0 0 6px var(--cream),
        inset 0 0 0 8px var(--black);
    }

    /* =========================================================
       HERO — Basquiat-meets-Fairey header
       ========================================================= */
    .hero {
      position: relative;
      padding: 60px 24px 40px;
      text-align: center;
      overflow: hidden;
      background:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 20px,
          rgba(227,52,47,0.03) 20px,
          rgba(227,52,47,0.03) 22px
        ),
        linear-gradient(180deg, var(--black), var(--dark));
      border-bottom: 4px solid var(--red);
    }

    /* Haring-style radiating lines behind title */
    .hero::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 600px; height: 600px;
      transform: translate(-50%, -50%);
      background:
        repeating-conic-gradient(
          from 0deg,
          transparent 0deg 8deg,
          rgba(227,52,47,0.06) 8deg 10deg
        );
      border-radius: 50%;
      pointer-events: none;
      animation: spin-slow 120s linear infinite;
    }

    @keyframes spin-slow {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Basquiat crown SVG above title */
    .crown {
      display: block;
      margin: 0 auto 8px;
      width: 64px;
      height: 40px;
      filter: drop-shadow(0 0 12px rgba(255,215,0,0.4));
      animation: crown-bob 3s ease-in-out infinite;
    }
    @keyframes crown-bob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-6px) rotate(2deg); }
    }

    .brand {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 80px;
      letter-spacing: 6px;
      color: var(--cream);
      text-transform: uppercase;
      position: relative;
      z-index: 2;
      display: inline-block;
      text-shadow:
        4px 4px 0 var(--red),
        -2px -2px 0 var(--red),
        0 0 40px rgba(227,52,47,0.3);
      /* Basquiat scratch-out effect */
      text-decoration: line-through;
      text-decoration-color: var(--red);
      text-decoration-thickness: 3px;
    }

    .tag {
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 12px;
      position: relative;
      z-index: 2;
    }

    /* Navigation */
    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: transparent;
      color: var(--cream);
      border: 2px solid var(--red);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .nav-link:hover {
      background: var(--red);
      color: var(--cream);
      box-shadow: 0 0 20px rgba(227,52,47,0.4);
    }
    .nav-link.active {
      background: var(--red);
      color: var(--cream);
    }
    .nav-link svg { width: 18px; height: 18px; }

    /* Haring-style dancing figures decoration */
    .haring-figures {
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 28px;
      z-index: 3;
      overflow: hidden;
    }
    .haring-figures svg {
      height: 28px;
      fill: var(--neon-yellow);
      opacity: 0.4;
      animation: march 20s linear infinite;
    }
    @keyframes march {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* =========================================================
       GRID — sticker wall
       ========================================================= */
    main { max-width: 1360px; margin: 32px auto; padding: 0 20px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-auto-rows: 1fr;
      gap: 10px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 4px;
      overflow: hidden;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 2px solid rgba(245,230,200,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s;
      isolation: isolate;
      cursor: pointer;
    }

    /* Basquiat-style scribble border on hover */
    .card:hover {
      transform: translateY(-8px) rotate(-0.5deg);
      box-shadow:
        6px 6px 0 var(--red),
        0 20px 50px rgba(0,0,0,0.6);
      border-color: var(--neon-yellow);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease, filter 0.3s;
    }
    .card:hover img {
      transform: scale(1.06);
      filter: contrast(1.1) saturate(1.2);
    }

    /* Haring-style energy lines on hover */
    .card::before {
      content: '';
      position: absolute;
      inset: -4px;
      background: transparent;
      border: 3px dashed transparent;
      z-index: 3;
      pointer-events: none;
      transition: border-color 0.3s;
    }
    .card:hover::before {
      border-color: var(--neon-yellow);
      animation: dash-move 0.6s linear infinite;
    }
    @keyframes dash-move {
      to { stroke-dashoffset: -20; }
    }

    /* Small label overlay — stencil style */
    .label {
      position: absolute;
      left: 6px; top: 6px;
      background: var(--red);
      color: var(--cream);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      padding: 2px 8px;
      z-index: 4;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
      .brand { font-size: 60px; }
    }
    @media (max-width: 700px) {
      .brand { font-size: 42px; letter-spacing: 3px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .card { min-height: 140px; }
      .hero { padding: 48px 16px 32px; }
      .propaganda-border { border-width: 3px; }
    }

    /* Footer — propaganda poster style */
    .footer {
      max-width: 1200px;
      margin: 32px auto 48px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-top: 2px solid rgba(245,230,200,0.08);
      padding-top: 24px;
    }
    .footer span {
      color: var(--red);
      font-weight: 700;
    }

    /* Refresh hint */
    .hint {
      position: fixed;
      bottom: 16px;
      right: 20px;
      background: var(--red);
      color: var(--cream);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      padding: 8px 14px;
      letter-spacing: 2px;
      z-index: 101;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid var(--cream);
    }
    .hint:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(227,52,47,0.5);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
      backdrop-filter: blur(8px);
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border: 4px solid var(--red);
      box-shadow: 0 0 60px rgba(227,52,47,0.3);
      animation: lb-in 0.3s ease;
    }
    @keyframes lb-in {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .lightbox .close-btn {
      position: absolute;
      top: 20px; right: 24px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--cream);
      cursor: pointer;
      background: var(--red);
      width: 48px; height: 48px;
      display: flex; justify-content: center; align-items: center;
      border: 2px solid var(--cream);
      z-index: 201;
    }
  </style>
</head>

"https://i.ibb.co/dsX50FK0/IMG20260329105115.jpg",
"https://i.ibb.co/RT1LsnvC/IMG20260329191447.jpg",
"https://i.ibb.co/tPZx4rF7/IMG20260329191458.jpg"
    ];

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const chosen = shuffle(IMAGES).slice(0, 12);
      chosen.forEach((src, idx) => {
        const card = document.createElement('div');
        card.className = 'card';

        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = (idx + 1);
        card.appendChild(label);

        const img = document.createElement('img');
        img.src = src;
        img.alt = `pegatina ${idx + 1}`;
        img.loading = 'lazy';
        img.decoding = 'async';
        img.onerror = function () {
          this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400"><rect width="100%" height="100%" fill="%230A0A0A"/><text x="50%" y="50%" fill="%23B8A88A" font-size="18" font-family="monospace" text-anchor="middle" dominant-baseline="middle">imagen no disponible</text></svg>';
        };
        img.addEventListener('click', () => openLightbox(src));
        card.appendChild(img);
        grid.appendChild(card);
      });
    }

    function refreshWall() {
      const grid = document.getElementById('grid');
      grid.style.opacity = '0';
      grid.style.transition = 'opacity 250ms ease';
      setTimeout(() => {
        renderGrid();
        grid.style.opacity = '1';
      }, 260);
    }

    // Lightbox
    function openLightbox(src) {
      document.getElementById('lb-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderGrid();
      document.addEventListener('keydown', e => {
        if (e.key.toLowerCase() === 'r') refreshWall();
        if (e.key === 'Escape') closeLightbox();
      });
      document.querySelector('.hero').addEventListener('dblclick', refreshWall);
    });
  </script>
</body>
</html>
